services:
  dockhand:
    image: fnsys/dockhand:${DOCKHAND_IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-dockhand}
    restart: unless-stopped
    depends_on:
      dockhand-postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@dockhand-postgres:5432/${POSTGRES_DB}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - dockhand-data:/app/data
    ports:
      - "${DOCKHAND_PORT:-3100}:3000"
    networks:
      - dockhand-network

  dockhand-postgres:
    image: postgres:${DOCKHAND_POSTGRES_IMAGE_TAG:-16-alpine}
    container_name: dockhand-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - dockhand-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - dockhand-network

volumes:
  dockhand-data:
    name: ${DATA_VOLUME_NAME:-dockhand-data}
  dockhand-postgres-data:
    name: ${POSTGRES_VOLUME_NAME:-dockhand-postgres-data}

networks:
  dockhand-network: