services:
  novu-api:
    image: ghcr.io/novuhq/novu/api:${NOVU_IMAGE_TAG:-latest}
    container_name: novu-api
    restart: unless-stopped
    depends_on:
      novu-mongodb:
        condition: service_healthy
      novu-redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_ROOT_URL: ${NOVU_API_ROOT_URL}
      FRONT_BASE_URL: ${NOVU_DASHBOARD_URL}
      MONGO_URL: "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@novu-mongodb:27017/novu-db?authSource=admin"
      MONGO_MIN_POOL_SIZE: 5
      MONGO_MAX_POOL_SIZE: 10
      MONGO_AUTO_CREATE_INDEXES: "true"
      REDIS_HOST: novu-redis
      REDIS_PORT: 6379
      REDIS_DB_INDEX: 2
      REDIS_CACHE_SERVICE_HOST: novu-redis
      REDIS_CACHE_SERVICE_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      STORE_ENCRYPTION_KEY: ${STORE_ENCRYPTION_KEY}
      NOVU_SECRET_KEY: ${NOVU_SECRET_KEY}
      IS_SELF_HOSTED: "true"
      IS_V2_ENABLED: "true"
      IS_API_IDEMPOTENCY_ENABLED: "false"
      IS_API_RATE_LIMITING_ENABLED: "false"
      SENTRY_DSN: ""
      NEW_RELIC_ENABLED: "false"
      S3_LOCAL_STACK: ""
      S3_BUCKET_NAME: ""
      S3_REGION: ""
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
    ports:
      - "${NOVU_API_PORT:-3400}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/v1/health-check || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - novu-network

  novu-worker:
    image: ghcr.io/novuhq/novu/worker:${NOVU_IMAGE_TAG:-latest}
    container_name: novu-worker
    restart: unless-stopped
    depends_on:
      novu-mongodb:
        condition: service_healthy
      novu-redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3004
      MONGO_URL: "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@novu-mongodb:27017/novu-db?authSource=admin"
      MONGO_MAX_POOL_SIZE: 10
      REDIS_HOST: novu-redis
      REDIS_PORT: 6379
      REDIS_DB_INDEX: 2
      REDIS_CACHE_SERVICE_HOST: novu-redis
      REDIS_CACHE_SERVICE_PORT: 6379
      STORE_ENCRYPTION_KEY: ${STORE_ENCRYPTION_KEY}
      API_ROOT_URL: http://novu-api:3000
      BROADCAST_QUEUE_CHUNK_SIZE: 100
      MULTICAST_QUEUE_CHUNK_SIZE: 100
      SENTRY_DSN: ""
      NEW_RELIC_ENABLED: "false"
      S3_LOCAL_STACK: ""
      S3_BUCKET_NAME: ""
      S3_REGION: ""
      AWS_ACCESS_KEY_ID: ""
      AWS_SECRET_ACCESS_KEY: ""
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3004/v1/health-check || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - novu-network

  novu-ws:
    image: ghcr.io/novuhq/novu/ws:${NOVU_IMAGE_TAG:-latest}
    container_name: novu-ws
    restart: unless-stopped
    depends_on:
      novu-mongodb:
        condition: service_healthy
      novu-redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3002
      MONGO_URL: "mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@novu-mongodb:27017/novu-db?authSource=admin"
      MONGO_MAX_POOL_SIZE: 10
      REDIS_HOST: novu-redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      SENTRY_DSN: ""
      NEW_RELIC_ENABLED: "false"
    ports:
      - "${NOVU_WS_PORT:-3402}:3002"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3002/v1/health-check || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - novu-network

  novu-dashboard:
    image: ghcr.io/novuhq/novu/dashboard:${NOVU_IMAGE_TAG:-latest}
    container_name: novu-dashboard
    restart: unless-stopped
    depends_on:
      novu-api:
        condition: service_healthy
      novu-worker:
        condition: service_healthy
    environment:
      VITE_API_HOSTNAME: ${NOVU_API_ROOT_URL}
      VITE_WEBSOCKET_HOSTNAME: ${NOVU_WS_URL}
      VITE_SELF_HOSTED: "true"
    ports:
      - "${NOVU_DASHBOARD_PORT:-4400}:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4000/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - novu-network

  novu-mongodb:
    image: mongo:${NOVU_MONGO_IMAGE_TAG:-8.0}
    container_name: novu-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    volumes:
      - novu-mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--username", "${MONGO_USERNAME}", "--password", "${MONGO_PASSWORD}", "--eval", "db.adminCommand('ping').ok"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - novu-network

  novu-redis:
    image: redis:${NOVU_REDIS_IMAGE_TAG:-7-alpine}
    container_name: novu-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - novu-redis-data:/data
    networks:
      - novu-network

volumes:
  novu-mongodb-data:
    name: ${MONGODB_VOLUME_NAME:-novu-mongodb-data}
  novu-redis-data:
    name: ${REDIS_VOLUME_NAME:-novu-redis-data}

networks:
  novu-network: