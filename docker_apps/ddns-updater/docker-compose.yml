name: ddns-updater
services:
  ddns-updater:
    image: ghcr.io/qdm12/ddns-updater:${DDNS_IMAGE_TAG:-latest}
    container_name: ${DDNS_CONTAINER_NAME:-ddns-updater}
    hostname: ddns-updater
    restart: unless-stopped
    environment:
      TZ: ${TZ}
      PERIOD: ${DDNS_PERIOD:-5m}
      LOG_LEVEL: ${DDNS_LOG_LEVEL:-info}
      CONFIG: |
        {
          "settings": [
            {
              "provider": "${DDNS_PROVIDER}",
              "domain": "${DDNS_DOMAIN}",
              "password": "${DDNS_PASSWORD}"
            }
          ]
        }
    ports:
      - "${DDNS_PORT:-8000}:8000/tcp"
    volumes:
      - ddns-updater-data:/updater/data
    networks:
      - ddns-network
    labels:
      komodo.skip:

volumes:
  ddns-updater-data:
    name: ddns-updater-data

networks:
  ddns-network:
    name: ddns-network
    driver: bridge