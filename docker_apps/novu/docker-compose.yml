services:
  novu-api:
    image: ghcr.io/novuhq/novu/api:${NOVU_IMAGE_TAG:-3.14.0}
    container_name: novu-api
    restart: unless-stopped
    depends_on:
      novu-mongodb:
        condition: service_healthy
      novu-redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_HOST: novu-redis
      REDIS_CACHE_SERVICE_HOST: novu-redis
      MONGO_URL: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@novu-mongodb:27017/novu-db?authSource=admin"
      IS_SELF_HOSTED: "true"
    ports:
      - "${NOVU_API_PORT:-3400}:${API_PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${API_PORT:-3000}/v1/health-check || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - novu-network

  novu-worker:
    image: ghcr.io/novuhq/novu/worker:${NOVU_IMAGE_TAG:-3.14.0}
    container_name: novu-worker
    restart: unless-stopped
    depends_on:
      novu-mongodb:
        condition: service_healthy
      novu-redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_HOST: novu-redis
      REDIS_CACHE_SERVICE_HOST: novu-redis
      MONGO_URL: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@novu-mongodb:27017/novu-db?authSource=admin"
      API_ROOT_URL: "http://novu-api:${API_PORT:-3000}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${WORKER_PORT:-3004}/v1/health-check || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - novu-network

  novu-ws:
    image: ghcr.io/novuhq/novu/ws:${NOVU_IMAGE_TAG:-3.14.0}
    container_name: novu-ws
    restart: unless-stopped
    depends_on:
      novu-mongodb:
        condition: service_healthy
      novu-redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      REDIS_HOST: novu-redis
      MONGO_URL: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@novu-mongodb:27017/novu-db?authSource=admin"
    ports:
      - "${NOVU_WS_PORT:-3402}:${WS_PORT:-3002}"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:$${WS_PORT:-3002}/v1/health-check || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - novu-network

  novu-dashboard:
    image: ghcr.io/novuhq/novu/dashboard:${NOVU_IMAGE_TAG:-3.14.0}
    container_name: novu-dashboard
    restart: unless-stopped
    depends_on:
      novu-api:
        condition: service_healthy
      novu-worker:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "${NOVU_DASHBOARD_PORT:-4400}:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:4000/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - novu-network

  novu-mongodb:
    image: mongo:${NOVU_MONGO_IMAGE_TAG:-8.0}
    container_name: novu-mongodb
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - novu-mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--username", "${MONGO_INITDB_ROOT_USERNAME}", "--password", "${MONGO_INITDB_ROOT_PASSWORD}", "--eval", "db.adminCommand('ping').ok"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - novu-network

  novu-redis:
    image: redis:${NOVU_REDIS_IMAGE_TAG:-7-alpine}
    container_name: novu-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - novu-redis-data:/data
    networks:
      - novu-network

volumes:
  novu-mongodb-data:
    name: ${MONGODB_VOLUME_NAME:-novu-mongodb-data}
  novu-redis-data:
    name: ${REDIS_VOLUME_NAME:-novu-redis-data}

networks:
  novu-network: