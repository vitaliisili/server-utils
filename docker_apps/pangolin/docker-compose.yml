name: pangolin

services:
  pangolin:
    image: docker.io/fosrl/pangolin:${PANGOLIN_IMAGE_TAG:-ee-1.17.1}
    container_name: pangolin
    restart: unless-stopped
    volumes:
      - ./config:/app/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/"]
      interval: "10s"
      timeout: "10s"
      retries: 15
    networks:
      - pangolin

  gerbil:
    image: docker.io/fosrl/gerbil:${GERBIL_IMAGE_TAG:-latest}
    container_name: gerbil
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
      - --reportBandwidthTo=http://pangolin:3001/api/v1/gerbil/receive-bandwidth
    volumes:
      - ./config/:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      - "51820:51820/udp"
      - "21820:21820/udp"
      - "443:443"
      - "80:80"
    networks:
      - pangolin

  traefik:
    image: docker.io/traefik:${TRAEFIK_IMAGE_TAG:-v3.6}
    container_name: traefik
    restart: unless-stopped
    network_mode: service:gerbil
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    volumes:
      - ./config/traefik:/etc/traefik
      - ./config/letsencrypt:/letsencrypt
      - ./config/traefik/logs:/var/log/traefik

  crowdsec:
    image: docker.io/crowdsecurity/crowdsec:${CROWDSEC_IMAGE_TAG:-latest}
    container_name: crowdsec
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      COLLECTIONS: ${CROWDSEC_COLLECTIONS:-}
      ENROLL_INSTANCE_NAME: pangolin-crowdsec
      ENROLL_TAGS: docker
      BOUNCER_KEY_traefik-bouncer: ${CROWDSEC_BOUNCER_KEY}
    volumes:
      - ./config/crowdsec/db:/var/lib/crowdsec/data
      - ./config/crowdsec/acquis.d:/etc/crowdsec/acquis.d
      - ./config/traefik/logs:/var/log/traefik:ro
    healthcheck:
      test: ["CMD", "cscli", "version"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pangolin

networks:
  pangolin:
    name: pangolin
    driver: bridge